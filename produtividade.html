<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <title>Produtividade</title>
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#030712">

  <style>
  *{ box-sizing: border-box; }
  html, body { width:100%; max-width:100%; overflow-x:hidden; }
  body{
    margin:0;
    padding:10px;
    background:#f3f3f3;
    font-family: Arial, sans-serif;
    color:#111;
  }
  canvas, img, svg{ max-width:100%; display:block; }

  .wrap{ max-width:100%; width:100%; margin:0; }

  .softLine{
    width:100%;
    height:1px;
    background: rgba(0,0,0,0.10);
    border-radius:999px;
  }

  .btn{
    appearance:none;
    border:0;
    border-radius:12px;
    padding:10px 14px;
    font-weight:800;
    cursor:pointer;
    background:#111;
    color:#fff;
    box-shadow:0 6px 14px rgba(0,0,0,0.12);
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    user-select:none;
    white-space:nowrap;
    height:40px;
  }
  .btn:active{ transform: translateY(1px); }
  .btn.secondary{
    background:#fff;
    color:#111;
    border:1px solid rgba(0,0,0,0.12);
    box-shadow:none;
  }
  .btn:disabled{
    opacity:.55;
    cursor:not-allowed;
    transform:none;
  }

  .filters{
    margin-top:0;
    background:#fff;
    border-radius:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.10);
    padding:12px 14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    align-items:stretch;
    max-width:100%;
  }

  .filtersHead{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:8px;
    padding-bottom:2px;
    min-width: 0;
  }
  .filtersHead h1{
    margin:0;
    font-size:18px;
    font-weight:900;
    letter-spacing:.2px;
    white-space:nowrap;
  }

  .subtitle{
    display:none;
    font-size:12px;
    color:#555;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 92vw;
  }

  .filtersRow{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:flex-end;
    max-width:100%;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
    min-width: 118px;
  }
  .field label{
    font-size:12px;
    color:#444;
    font-weight:800;
    white-space:nowrap;
  }
  .input, .select{
    border:1px solid rgba(0,0,0,0.12);
    border-radius:12px;
    padding:10px 10px;
    background:#fff;
    outline:none;
    font-size:14px;
    max-width:100%;
    height: 40px;
  }
  .input:focus, .select:focus{
    border-color:#111;
    box-shadow:0 0 0 3px rgba(0,0,0,0.08);
  }

  .multi{ position:relative; min-width:200px; }
  .multiBtn{
    width:100%;
    text-align:left;
    border:1px solid rgba(0,0,0,0.12);
    border-radius:12px;
    padding:10px 10px;
    background:#fff;
    cursor:pointer;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    max-width:100%;
    height: 40px;
  }
  .multiBtn:disabled{
    opacity:.65;
    cursor:not-allowed;
  }

  .multiPanel{
    position:absolute;
    left:0; right:0;
    top: calc(100% + 6px);
    background:#fff;
    border:1px solid rgba(0,0,0,0.12);
    border-radius:12px;
    box-shadow:0 10px 24px rgba(0,0,0,0.14);
    padding:10px;
    z-index: 20;
    display:none;
    max-height: 260px;
    overflow:auto;
  }
  .multiPanel.open{ display:block; }

  .multiItem{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 6px;
    border-radius:10px;
  }
  .multiItem:hover{ background: rgba(0,0,0,0.04); }
  .multiItem input{ transform: scale(1.05); }

  .multiActions{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:10px;
    padding-bottom:10px;
    border-bottom:1px solid rgba(0,0,0,0.08);
  }
  .btnTiny{
    appearance:none;
    border:1px solid rgba(0,0,0,0.12);
    background:#fff;
    color:#111;
    border-radius:10px;
    padding:8px 10px;
    cursor:pointer;
    font-weight:900;
    font-size:12px;
  }
  .btnTiny:disabled{
    opacity:.6;
    cursor:not-allowed;
  }

  .monthWrap{ position:relative; }
  .monthWrap .input{ padding-right: 10px; }
  .monthWrap .input.monthNative{
    color: transparent;
    text-shadow: none;
    caret-color: transparent;
  }
  .monthDisp{
    position:absolute;
    left:10px;
    right:10px;
    top:50%;
    transform: translateY(-50%);
    font-size:14px;
    font-weight:800;
    color:#111;
    pointer-events:none;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .monthDisp.muted{ color:#666; font-weight:800; }

  .grid{
    margin-top:12px;
    display:grid;
    grid-template-columns: minmax(0, 1.55fr) minmax(0, .85fr);
    gap:12px;
    align-items:start;
    max-width:100%;
  }
  .card{
    background:#fff;
    border-radius:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.10);
    padding:12px 14px;
    min-width:0;
    max-width:100%;
  }

  .cardHead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:10px;
    min-width:0;
  }
  .card h2{
    margin:0;
    font-size:14px;
    font-weight:900;
    letter-spacing:.2px;
  }
  .headBtns{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

  .tableWrap{
    width:100%;
    max-width:100%;
    overflow-x:auto;
    overflow-y:auto;
    border-radius:12px;
    border:1px solid rgba(0,0,0,0.10);
    display:block;
  }
  table{
    border-collapse:collapse;
    width:max-content;
    min-width:100%;
    background:#fff;
  }
  thead th{
    position:sticky;
    top:0;
    background:#111;
    color:#fff;
    border-bottom:1px solid rgba(255,255,255,0.16);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.4px;
    padding:6px 10px;
    text-align:left;
    white-space:nowrap;
  }
  tbody td{
    border-bottom:1px solid rgba(0,0,0,0.07);
    padding:6px 10px;
    font-size:13px;
    white-space:nowrap;
  }
  tbody tr:hover{ background: rgba(0,0,0,0.03); }

  tr.totalRow td{
    background:#fff3c6;
    font-weight:900;
    border-top:1px solid rgba(0,0,0,0.10);
  }

  #cardTabela.isResumo thead th,
  #cardTabela.isResumo tbody td{ padding:5px 10px; }
  #cardTabela.isRegistros thead th,
  #cardTabela.isRegistros tbody td{ padding:4px 10px; }

  .pill{
    display:inline-flex;
    padding:4px 10px;
    border-radius:999px;
    font-weight:900;
    font-size:12px;
    border:1px solid rgba(0,0,0,0.10);
    background:#fff;
  }

  .actions{ display:flex; gap:8px; align-items:center; }
  .linkBtn{
    background:#fff;
    border:1px solid rgba(0,0,0,0.12);
    border-radius:10px;
    padding:6px 10px;
    cursor:pointer;
    font-weight:900;
    font-size:12px;
  }
  .linkBtn:disabled{ opacity:.55; cursor:not-allowed; }

  .kpiGrid{
    display:grid;
    grid-template-columns: 1fr;
    gap:12px;
    align-items:stretch;
    margin-bottom:12px;
  }
  .kpiCard{
    background:#fff;
    border-radius:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.10);
    padding:12px 14px;
    min-width:0;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .kpiTop{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:8px;
  }
  .kpiTitle{
    margin:0;
    font-size:12px;
    font-weight:900;
    color:#444;
    letter-spacing:.2px;
    text-transform:uppercase;
  }
  .kpiValue{
    font-size:22px;
    font-weight:900;
    letter-spacing:.2px;
    margin:0;
    color:#111;
  }
  .kpiHint{
    margin:0;
    font-size:12px;
    color:#666;
    font-weight:800;
  }

  .sideCard{ padding:12px 12px 12px 12px; }
  .chartBox{ width:100%; min-width:0; max-width:100%; }
  canvas{
    width:100% !important;
    height: 360px !important;
    border:0;
    border-radius:12px;
    background:#fff;
  }

  .modalBack{
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.48);
    display:none;
    align-items:center;
    justify-content:center;
    padding:14px;
    z-index: 50;
  }
  .modalBack.open{ display:flex; }
  .modal{
    width: 100%;
    max-width: 620px;
    background:#fff;
    border-radius:16px;
    box-shadow:0 16px 42px rgba(0,0,0,0.24);
    overflow:hidden;
  }
  .modalHead{
    padding:14px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    border-bottom:1px solid rgba(0,0,0,0.08);
  }
  .modalHead h3{
    margin:0;
    font-size:14px;
    font-weight:900;
    letter-spacing:.2px;
  }
  .modalBody{
    padding:14px;
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
  }
  .modalBody .field{ min-width:0; }
  .modalFoot{
    padding:12px 14px;
    border-top:1px solid rgba(0,0,0,0.08);
    display:flex;
    justify-content:flex-end;
    gap:10px;
    flex-wrap:wrap;
  }
  .span2{ grid-column: span 2; }

  .suggest{ position:relative; }
  .suggestList{
    position:absolute;
    left:0;
    right:0;
    top: calc(100% + 6px);
    background:#fff;
    border:1px solid rgba(0,0,0,0.12);
    border-radius:12px;
    box-shadow:0 10px 24px rgba(0,0,0,0.14);
    max-height: 220px;
    overflow:auto;
    display:none;
    z-index: 60;
  }
  .suggestList.open{ display:block; }
  .suggestItem{
    padding:10px 10px;
    cursor:pointer;
    border-bottom:1px solid rgba(0,0,0,0.06);
    font-size:13px;
  }
  .suggestItem:hover{ background: rgba(0,0,0,0.04); }
  .suggestItem b{ font-weight:900; }

  .listBox{
    grid-column: span 2;
    border:1px solid rgba(0,0,0,0.10);
    border-radius:12px;
    overflow:hidden;
  }
  .listHead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 12px;
    background:#fafafa;
    border-bottom:1px solid rgba(0,0,0,0.08);
    font-weight:900;
    font-size:12px;
    letter-spacing:.2px;
    text-transform:uppercase;
    color:#444;
  }
  .listBody{
    max-height: 220px;
    overflow:auto;
    padding:8px;
    background:#fff;
  }
  .listItem{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 10px;
    border:1px solid rgba(0,0,0,0.08);
    border-radius:12px;
    margin-bottom:8px;
  }
  .listItem:last-child{ margin-bottom:0; }
  .liLeft{
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .liTop{
    font-weight:900;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 420px;
  }
  .liSub{
    font-weight:800;
    color:#666;
    font-size:12px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 420px;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    background:#111;
    color:#fff;
    padding:10px 14px;
    border-radius:999px;
    font-weight:900;
    font-size:13px;
    box-shadow:0 10px 26px rgba(0,0,0,0.25);
    display:none;
    z-index: 80;
  }
  .toast.show{ display:block; }

  .loadingBack{
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.50);
    display:none;
    align-items:center;
    justify-content:center;
    z-index: 90;
    padding:14px;
  }
  .loadingBack.open{ display:flex; }
  .loadingCard{
    width:100%;
    max-width: 420px;
    background:#fff;
    border-radius:16px;
    box-shadow:0 16px 42px rgba(0,0,0,0.24);
    padding:14px;
  }
  .loadingTitle{
    font-weight:900;
    margin:0 0 10px 0;
    font-size:14px;
  }
  .bar{
    width:100%;
    height:12px;
    border-radius:999px;
    background: rgba(0,0,0,0.10);
    overflow:hidden;
  }
  .bar > div{
    height:100%;
    width:0%;
    background:#111;
    border-radius:999px;
    transition: width .15s linear;
  }
  .pct{
    margin-top:8px;
    font-size:12px;
    font-weight:900;
    color:#333;
    text-align:right;
  }

  .alertBack{
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.48);
    display:none;
    align-items:center;
    justify-content:center;
    padding:14px;
    z-index: 95;
  }
  .alertBack.open{ display:flex; }
  .alertBox{
    width:100%;
    max-width: 560px;
    background:#fff;
    border-radius:16px;
    box-shadow:0 16px 42px rgba(0,0,0,0.24);
    overflow:hidden;
  }
  .alertHead{
    padding:14px 14px;
    border-bottom:1px solid rgba(0,0,0,0.08);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .alertHead h3{
    margin:0;
    font-size:14px;
    font-weight:900;
  }
  .alertBody{
    padding:14px;
    font-weight:900;
    line-height:1.35;
    color:#111;
  }
  .alertFoot{
    padding:12px 14px;
    border-top:1px solid rgba(0,0,0,0.08);
    display:flex;
    justify-content:flex-end;
    gap:10px;
    flex-wrap:wrap;
  }

  .colsMulti{ min-width:95px !important; }
  #colunasPanel{
    left:auto !important;
    right:0 !important;
    width:min(360px, 92vw) !important;
    max-height:none !important;
    overflow:visible !important;
  }

  @media (min-width: 1180px){
    .filtersRow{ flex-wrap:nowrap; }
    .multi{ min-width: 190px; }
    .field{ min-width: 112px; }
    .field.searchField{ min-width: 170px; }
    .btn{ padding:10px 12px; }
  }

  @media (max-width: 980px){
    .grid{ grid-template-columns: 1fr; }
    .subtitle{ max-width: 92vw; }
    .liTop, .liSub{ max-width: 78vw; }
  }

  @media (max-width: 640px){
    .filtersRow{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:8px;
      align-items:end;
    }
    .field, .multi{ min-width:0 !important; }
    .btn{ width:100%; }

    .fLojas   { grid-column: 1; grid-row: 1; }
    .fIni     { grid-column: 2; grid-row: 1; }
    .fFim     { grid-column: 1; grid-row: 2; }
    .fSetores { grid-column: 2; grid-row: 2; }

    .fSearch  { grid-column: 1; grid-row: 3; }
    .bLimpar  { grid-column: 2; grid-row: 3; }

    .bVoltar  { grid-column: 1; grid-row: 4; }
    .bAdd     { grid-column: 2; grid-row: 4; }
  }
</style>
</head>

<body>
  <div class="wrap">

    <div class="filters">
      <div class="filtersHead">
        <h1>CONTROLE DE PRODUTIVIDADE</h1>
        <div class="softLine"></div>
        <div class="subtitle" id="subInfo">—</div>
      </div>

      <div class="filtersRow">
        <div class="field multi fLojas" style="min-width: 200px;">
          <label>Lojas</label>
          <button class="multiBtn" id="lojasBtn" type="button">
            <span id="lojasBtnTxt">—</span>
            <span style="font-weight:900;">▾</span>
          </button>
          <div class="multiPanel" id="lojasPanel"></div>
        </div>

        <div class="field fIni" style="min-width: 140px;">
          <label>Mês/ano início</label>
          <div class="monthWrap">
            <input class="input monthNative" id="fDataIni" type="month" />
            <span class="monthDisp muted" id="fDataIniDisp">—</span>
          </div>
        </div>

        <div class="field fFim" style="min-width: 140px;">
          <label>Mês/ano fim</label>
          <div class="monthWrap">
            <input class="input monthNative" id="fDataFim" type="month" />
            <span class="monthDisp muted" id="fDataFimDisp">—</span>
          </div>
        </div>

        <div class="field multi fSetores" style="min-width: 190px;">
          <label>Setores</label>
          <button class="multiBtn" id="setoresBtn" type="button">
            <span id="setoresBtnTxt">Todos</span>
            <span style="font-weight:900;">▾</span>
          </button>
          <div class="multiPanel" id="setoresPanel"></div>
        </div>

        <div class="field searchField fSearch" style="min-width: 170px;">
          <label>Pesquisar (nome ou matrícula)</label>
          <input class="input" id="fSearch" type="text" placeholder="Digite 2+ caracteres..." />
        </div>

        <button class="btn secondary bLimpar" id="btnLimparFiltros" type="button">Limpar</button>
        <button class="btn secondary bVoltar" id="btnVoltar" type="button">Voltar</button>
        <button class="btn bAdd" id="btnAdicionar" type="button">+Adicionar</button>
      </div>
    </div>

    <div class="grid">
      <div class="card isRegistros" id="cardTabela">
        <div class="cardHead">
          <h2 id="hRegistros">Registros</h2>

          <div class="headBtns">
            <div class="multi colsMulti" style="min-width: 95px;">
              <button class="multiBtn" id="colunasBtn" type="button">
                <span id="colunasBtnTxt">Colunas</span>
                <span style="font-weight:900;">▾</span>
              </button>
              <div class="multiPanel" id="colunasPanel"></div>
            </div>

            <button class="btn secondary" id="btnResumo" type="button">Resumo</button>
          </div>
        </div>

        <div class="tableWrap">
          <table id="tbl">
            <thead>
              <tr id="theadRow"></tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="card sideCard chartBox">
        <div class="kpiGrid">
          <div class="kpiCard">
            <div class="kpiTop">
              <div class="kpiTitle">Quantidade</div>
            </div>
            <p class="kpiValue" id="kpiQtd">0</p>
            <p class="kpiHint">Soma da qtd (filtros)</p>
          </div>
        </div>

        <div class="softLine" style="margin: 2px 0 10px 0;"></div>

        <h2 style="margin-bottom:10px;">Qtd por Setor</h2>
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <style id="colHideStyle"></style>

  <div class="modalBack" id="modalBack" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modalHead">
        <h3 id="modalTitle">Adicionar</h3>
      </div>

      <div class="modalBody">
        <div class="field">
          <label>Setor</label>
          <select class="select" id="mSetor"></select>
        </div>

        <div class="field">
          <label>Matrícula</label>
          <input class="input" id="mMatricula" type="text" inputmode="numeric" maxlength="5" placeholder="3 a 5 dígitos" />
        </div>

        <div class="field span2 suggest">
          <label>Nome completo</label>
          <input class="input" id="mNome" type="text" placeholder="Digite para buscar..." autocomplete="off" />
          <div class="suggestList" id="mSugList"></div>
        </div>

        <div class="field">
          <label>Data</label>
          <input class="input" id="mData" type="date" />
        </div>

        <div class="field">
          <label>Loja (login)</label>
          <input class="input" id="mLoja" type="text" disabled />
        </div>

        <div class="listBox" id="mListBox" style="display:none;">
          <div class="listHead">
            <span>Lista para envio</span>
            <span id="mListCount">0 item(s)</span>
          </div>
          <div class="listBody" id="mListBody"></div>
        </div>
      </div>

      <div class="modalFoot">
        <button class="btn secondary" id="btnCancelar" type="button">Cancelar</button>
        <button class="btn secondary" id="btnAddLista" type="button" style="display:none;">Adicionar na lista</button>
        <button class="btn" id="btnSalvar" type="button">Salvar</button>
      </div>
    </div>
  </div>

  <div class="alertBack" id="pendBack" aria-hidden="true">
    <div class="alertBox" role="dialog" aria-modal="true">
      <div class="alertHead">
        <h3>Lista pendente de envio</h3>

  <script>
    const SESSION_KEY = "pppSession";
    const SESSION_TTL_MS = 4 * 60 * 60 * 1000;

    function irParaLogin(){
      try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
      window.location.href = "/login.html";
    }

    function lerSessao(){
      try{
        const raw = localStorage.getItem(SESSION_KEY);
        if (!raw) return null;
        const s = JSON.parse(raw);
        return s && typeof s === "object" ? s : null;
      }catch(e){ return null; }
    }

    function salvarSessao(sessao){
      try{ localStorage.setItem(SESSION_KEY, JSON.stringify(sessao)); }catch(e){}
    }

    function touchSessao(){
      const s = lerSessao();
      if (!s) return;
      s.lastActiveAt = Date.now();
      salvarSessao(s);
    }

    function sessaoExpirada(){
      const s = lerSessao();
      if(!s) return true;

      if(!s.usuario || !s.loja || !s.perfil) return true;

      const base = Number(s.lastActiveAt || s.loginAt || 0);
      if(!base){
        s.lastActiveAt = Date.now();
        salvarSessao(s);
        return false;
      }
      return (Date.now() - base) > SESSION_TTL_MS;
    }

    ["click","keydown","mousemove","touchstart","scroll"].forEach(evt=>{
      window.addEventListener(evt, ()=>{ try{ touchSessao(); }catch(e){} }, {passive:true});

      "Prevenção",

    async function fakeProgressUntil(pctMax, stepMs){
      let pct = 0;
      barFill.style.width = "0%";
      barPct.textContent = "0%";
      return new Promise(resolve=>{
        const t = setInterval(()=>{
          pct += Math.max(1, Math.floor(Math.random()*6));
          if(pct > pctMax) pct = pctMax;
          barFill.style.width = pct + "%";
          barPct.textContent = pct + "%";
          if(pct >= pctMax){
            clearInterval(t);
            resolve();
          }
        }, stepMs);
      });
    }

    function parseDataAny(s){
      const t = String(s || "").trim();
      if(!t) return null;

      if(/^\d{4}-\d{2}-\d{2}$/.test(t)){
        const [y,m,d] = t.split("-").map(Number);
        return new Date(y, m-1, d, 0,0,0,0);
      }
      if(/^\d{2}\/\d{2}\/\d{4}$/.test(t)){
        const [d,m,y] = t.split("/").map(Number);
        return new Date(y, m-1, d, 0,0,0,0);
      }
      return null;
    }

    function isoToBR(iso){
      const d = parseDataAny(iso);
      if(!d) return String(iso ?? "");
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yyyy = d.getFullYear();
      return `${dd}/${mm}/${yyyy}`;
    }

    function formatBRDateFromAny(s){
      const d = parseDataAny(s);
      if(!d) return String(s ?? "");
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yyyy = d.getFullYear();
      return `${dd}/${mm}/${yyyy}`;
    }

    function parseBRNumber(v){
      if(typeof v === "number" && isFinite(v)) return v;
      let s = String(v ?? "").trim();
      if(!s) return 0;
      s = s.replace(/[R$\s]/g, "");
      if(s.includes(",")) s = s.replace(/\./g, "").replace(",", ".");
      const n = Number(s);
      return isFinite(n) ? n : 0;
    }

    const MONTH_ABBR_PT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

    function monthNowValue(){
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,"0");
      return `${yyyy}-${mm}`;
    }

    function monthToStartDate(monthVal){
      const t = String(monthVal || "").trim();
      if(!/^\d{4}-\d{2}$/.test(t)) return null;
      const [y,m] = t.split("-").map(Number);
      return new Date(y, m-1, 1, 0,0,0,0);
    }

    function monthToEndDate(monthVal){
      const t = String(monthVal || "").trim();
      if(!/^\d{4}-\d{2}$/.test(t)) return null;
      const [y,m] = t.split("-").map(Number);
      return new Date(y, m, 0, 23,59,59,999);
    }

    function monthValueToDisp(monthVal){
      const t = String(monthVal || "").trim();
      if(!/^\d{4}-\d{2}$/.test(t)) return "—";
      const [y,mm] = t.split("-").map(Number);
      const mIdx = Math.max(1, Math.min(12, mm)) - 1;
      return `${MONTH_ABBR_PT[mIdx]}/${y}`;
    }

    function syncMonthDisplays(){
      const di = fDataIni.value;
      const df = fDataFim.value;

      const t1 = monthValueToDisp(di);
      const t2 = monthValueToDisp(df);

      fDataIniDisp.textContent = t1;
      fDataFimDisp.textContent = t2;

      fDataIniDisp.classList.toggle("muted", t1 === "—");
      fDataFimDisp.classList.toggle("muted", t2 === "—");
    }

    function normSetor(setor){
      const s = String(setor || "").trim();
      if(s === "Prevenção e Limpeza") return "Prevenção";
      return s;
    }

    const setoresState = new Map();
    function buildSetoresPanel(){
      setoresPanel.innerHTML = "";
      SETORES.forEach(s=>{
        setoresState.set(s, true);
        const row = document.createElement("label");
        row.className = "multiItem";
        row.innerHTML = `
          <input type="checkbox" checked data-setor="${s}">
          <span style="font-weight:800;">${s}</span>
        `;
        setoresPanel.appendChild(row);
      });

      setoresPanel.addEventListener("change", (e)=>{
        const cb = e.target && e.target.matches("input[type='checkbox']") ? e.target : null;
        if(!cb) return;
        const s = cb.getAttribute("data-setor");
        setoresState.set(s, cb.checked);
        refreshSetoresBtnText();
        aplicarFiltrosERender();
      });
      refreshSetoresBtnText();
    }

    function refreshSetoresBtnText(){
      const selected = SETORES.filter(s=>setoresState.get(s));
      if(selected.length === SETORES.length) setoresBtnTxt.textContent = "Todos";
      else if(selected.length === 0) setoresBtnTxt.textContent = "Nenhum";
      else setoresBtnTxt.textContent = selected.length + " selecionado(s)";
    }

    function getSelectedSetores(){
      return SETORES.filter(s=>setoresState.get(s));
    }

    setoresBtn.addEventListener("click", ()=> setoresPanel.classList.toggle("open"));
    document.addEventListener("click", (e)=>{
      if(setoresPanel.classList.contains("open")){
        const inside = setoresPanel.contains(e.target) || setoresBtn.contains(e.target);
        if(!inside) setoresPanel.classList.remove("open");
      }
    });

    function normKey(v){ return String(v ?? "").trim().toUpperCase().replace(/\s+/g, " "); }
    function isViewAll(){
      return PERFIS_TODAS_LOJAS.has(String(sessao?.perfil || "").toUpperCase());
    }

    const lojasState = new Map();
    function setAllLojasChecked(flag){
      for(const [k, obj] of lojasState.entries()){
        obj.checked = !!flag;
        lojasState.set(k, obj);
      }
      lojasPanel.querySelectorAll("input[type='checkbox'][data-loja]").forEach(cb=>{
        cb.checked = !!flag;
      });
      refreshLojasBtnText();
      aplicarFiltrosERender();
    }

    function refreshLojasBtnText(){
      const total = lojasState.size;
      const selected = [...lojasState.values()].filter(x=>x.checked).length;

      if(total === 0){
        lojasBtnTxt.textContent = "—";
        return;
      }
      if(selected === total) lojasBtnTxt.textContent = "Todas";
      else if(selected === 0) lojasBtnTxt.textContent = "Nenhuma";
      else lojasBtnTxt.textContent = selected + " selecionada(s)";
    }

    function getSelectedLojas(){
      const out = [];
      for(const obj of lojasState.values()){
        if(obj.checked) out.push(obj.label);
      }
      return out;
    }

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m=>({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function buildLojasPanelFromRows(rows){
      lojasState.clear();
      lojasPanel.innerHTML = "";

      const lojaSessao = String(sessao?.loja || "").trim();
      const perfilAll = isViewAll();

      const set = new Map();
      for(const r of rows){
        const lj = String(r.loja || "").trim();
        if(!lj) continue;
        set.set(normKey(lj), lj);
      }
      const lojas = [...set.values()].sort((a,b)=> a.localeCompare(b, "pt-BR"));

      const actions = document.createElement("div");
      actions.className = "multiActions";

      const btnAll = document.createElement("button");
      btnAll.type = "button";
      btnAll.className = "btnTiny";
      btnAll.textContent = "Marcar todas";
      btnAll.disabled = !perfilAll;

      const btnNone = document.createElement("button");
      btnNone.type = "button";
      btnNone.className = "btnTiny";
      btnNone.textContent = "Desmarcar todas";
      btnNone.disabled = !perfilAll;

      actions.appendChild(btnAll);
      actions.appendChild(btnNone);
      lojasPanel.appendChild(actions);

      btnAll.addEventListener("click", ()=> setAllLojasChecked(true));
      btnNone.addEventListener("click", ()=> setAllLojasChecked(false));

      for(const lj of lojas){
        const k = normKey(lj);
        const checkedDefault = perfilAll
          ? (normKey(lj) === normKey(lojaSessao))
          : true;

        lojasState.set(k, { label: lj, checked: checkedDefault });

        const row = document.createElement("label");
        row.className = "multiItem";
        row.innerHTML = `
          <input type="checkbox" ${checkedDefault ? "checked":""} data-loja="${esc(lj)}" ${perfilAll ? "" : "disabled"}>
          <span style="font-weight:800;">${esc(lj)}</span>
        `;
        lojasPanel.appendChild(row);
      }

      refreshLojasBtnText();
      lojasBtn.disabled = !perfilAll;
    }

    lojasBtn.addEventListener("click", ()=>{
      if(lojasBtn.disabled) return;
      lojasPanel.classList.toggle("open");
    });

    document.addEventListener("click", (e)=>{
      if(lojasPanel.classList.contains("open")){
        const inside = lojasPanel.contains(e.target) || lojasBtn.contains(e.target);
        if(!inside) lojasPanel.classList.remove("open");
      }
    });

    lojasPanel.addEventListener("change", (e)=>{
      const cb = e.target && e.target.matches("input[type='checkbox'][data-loja]") ? e.target : null;
      if(!cb) return;
      const label = cb.getAttribute("data-loja");
      const k = normKey(label);
      const obj = lojasState.get(k);
      if(!obj) return;
      obj.checked = cb.checked;
      lojasState.set(k, obj);
      refreshLojasBtnText();
      aplicarFiltrosERender();
    });

    const colState = new Map();

    function setColVisible(key, on){
      const it = colState.get(key);
      if(!it) return;
      it.visible = !!on;
      colState.set(key, it);
      applyColVisibility();
      syncColunasCheckbox(key, !!on);
    }

    function syncColunasCheckbox(key, on){
      const cb = colunasPanel.querySelector(`input[type="checkbox"][data-colkey="${key}"]`);
      if(cb) cb.checked = !!on;
    }

    function applyColVisibility(){
      let css = "";
      for(const [key, it] of colState.entries()){
        if(!it.visible){
          css += `#tbl [data-col="${key}"]{display:none !important;}\n`;
        }
      }
      colHideStyle.textContent = css;
    }

    function visibleColumnCount(){
      const ths = Array.from(theadRow.querySelectorAll("th"));
      let count = 0;
      for(const th of ths){
        const key = th.getAttribute("data-col");
        if(!key){ count++; continue; }
        const it = colState.get(key);
        if(!it || it.visible) count++;
      }
      return Math.max(1, count);
    }

    colunasBtn.addEventListener("click", ()=> colunasPanel.classList.toggle("open"));
    document.addEventListener("click", (e)=>{
      if(colunasPanel.classList.contains("open")){

        if(!inside) colunasPanel.classList.remove("open");
      }
    });

    async function apiPost(url, payload){
      const res = await fetch(url, {
        method:"POST",
        credentials:"include",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify(payload || {})
      });

      const data = await res.json().catch(()=> ({}));
      if(!res.ok || data.sucesso === false){
        const err = new Error(data?.message || ("Erro na API: " + res.status));
        err.status = res.status;
        throw err;
      }
      return data;
    }

    async function carregarDados(){
      if(sessaoExpirada()) return irParaLogin();

      sessao = lerSessao();
      if(!sessao || !sessao.usuario || !sessao.loja || !sessao.perfil) return irParaLogin();

      subInfo.textContent = `Usuário: ${sessao.usuario} | Loja: ${sessao.loja} | Perfil: ${sessao.perfil}`;

      setLoading(true, "Carregando dados…");
      await fakeProgressUntil(85, 80);

      try{
        const payload = isViewAll()
          ? { loja: "" }
          : { loja: String(sessao.loja) };

        const data = await apiPost("/api/produtividade-listar", payload);

        dadosBrutos = Array.isArray(data.rows) ? data.rows : [];

        for(const r of dadosBrutos){
          r.setor = normSetor(r.setor);
        }

        buildLojasPanelFromRows(dadosBrutos);

        await fakeProgressUntil(100, 30);
        setLoading(false);

        aplicarFiltrosERender();
      }catch(err){
        setLoading(false);
        if(err && (err.status === 401 || err.status === 403)) return irParaLogin();
        showToast(err.message || "Erro ao carregar");
      }
    }

    function aplicarFiltrosERender(){
      const di = fDataIni.value ? monthToStartDate(fDataIni.value) : null;
      const df = fDataFim.value ? monthToEndDate(fDataFim.value) : null;

      const setoresSel = new Set(getSelectedSetores());

      let q = (fSearch.value || "").trim().toLowerCase();
      if(q.length < 2) q = "";

      const lojasSel = new Set(getSelectedLojas().map(normKey));

      dadosFiltrados = dadosBrutos.filter(r=>{
        if(lojasSel.size > 0){
          if(!lojasSel.has(normKey(r.loja))) return false;
        }else{
          return false;
        }

        const rd = parseDataAny(r.data);
        if(di && rd && rd < di) return false;
        if(df && rd && rd > df) return false;

        const setorNorm = normSetor(r.setor);
        if(setoresSel.size && !setoresSel.has(setorNorm)) return false;

        if(q){
          const t = `${r.nome||""} ${r.matricula||""}`.toLowerCase();
          if(!t.includes(q)) return false;
        }
        return true;
      });

      dadosFiltrados.sort((a,b)=>{
        const da = parseDataAny(a.data)?.getTime() || 0;
        const db = parseDataAny(b.data)?.getTime() || 0;
        return db - da;
      });

      renderKPIs();
      renderTabela();
      renderChart();
    }

    fDataIni.addEventListener("change", ()=>{ syncMonthDisplays(); aplicarFiltrosERender(); });
    fDataFim.addEventListener("change", ()=>{ syncMonthDisplays(); aplicarFiltrosERender(); });

    let searchTimer = null;
    fSearch.addEventListener("input", ()=>{
      clearTimeout(searchTimer);
      searchTimer = setTimeout(()=> aplicarFiltrosERender(), 180);
    });

    btnLimparFiltros.addEventListener("click", ()=>{
      const m = monthNowValue();
      fDataIni.value = m;
      fDataFim.value = m;
      fSearch.value = "";
      syncMonthDisplays();

      SETORES.forEach(s=> setoresState.set(s, true));
      [...setoresPanel.querySelectorAll("input[type='checkbox']")].forEach(cb=> cb.checked = true);
      refreshSetoresBtnText();

      const lojaSessao = String(sessao?.loja || "").trim();
      for(const [k, obj] of lojasState.entries()){
        obj.checked = (normKey(obj.label) === normKey(lojaSessao));
        lojasState.set(k, obj);
      }
      lojasPanel.querySelectorAll("input[type='checkbox'][data-loja]").forEach(cb=>{
        const lj = cb.getAttribute("data-loja");
        cb.checked = (normKey(lj) === normKey(lojaSessao));
      });
      refreshLojasBtnText();

      aplicarFiltrosERender();
    });

    function renderKPIs(){
      let totQtd = 0;
      for(const r of dadosFiltrados){
        totQtd += parseBRNumber(r.qtd);
      }
      kpiQtd.textContent = String(totQtd);
    }

    function canEditRow(row){
      if(isViewAll()) return true;
      return normKey(row.loja) === normKey(sessao.loja);

    function buildResumoPorLoja(rows){
      const map = new Map();

      for(const r of rows){
        const loja = String(r.loja || "").trim();
        if(!loja) continue;

        const qtd = parseBRNumber(r.qtd);

        if(!map.has(loja)){
          map.set(loja, { loja, qtd:0 });
        }
        const it = map.get(loja);
        it.qtd += (isFinite(qtd) ? qtd : 0);
      }

      const out = [];
      for(const [loja, it] of map.entries()){
        out.push({ loja, qtd: it.qtd });
      }

      out.sort((a,b)=> a.loja.localeCompare(b.loja, "pt-BR"));
      return out;
    }

    function renderChart(){
      const agg = new Map();
      for(const s of SETORES) agg.set(s, 0);

      for(const r of dadosFiltrados){
        const setor = normSetor(r.setor);
        const v = parseBRNumber(r.qtd);
        agg.set(setor, (agg.get(setor) || 0) + (isFinite(v) ? v : 0));
      }

      let items = SETORES.map(s=>({ label:s, value: agg.get(s) || 0 }));
      items = items.filter(it => (isFinite(it.value) ? it.value : 0) > 0);
      items.sort((a,b)=> (b.value - a.value) || a.label.localeCompare(b.label, "pt-BR"));

      drawHBarChart(ctx, items);
    }

    function lerp(a,b,t){ return a + (b-a)*t; }
    function clamp01(x){ return Math.max(0, Math.min(1, x)); }

    function barColorByIndex(i, n){
      const t = (n <= 1) ? 0 : clamp01(i / (n-1));
      const r = Math.round(lerp(18, 70, t));
      const g = Math.round(lerp(130, 210, t));
      const b = Math.round(lerp(35, 90, t));
      return `rgba(${r},${g},${b},0.92)`;
    }

    function roundRectPath(ctx, x, y, w, h, r){
      const rr = Math.max(0, Math.min(r, w/2, h/2));
      ctx.beginPath();
      ctx.moveTo(x+rr, y);
      ctx.arcTo(x+w, y, x+w, y+h, rr);
      ctx.arcTo(x+w, y+h, x, y+h, rr);
      ctx.arcTo(x, y+h, x, y, rr);
      ctx.arcTo(x, y, x+w, y, rr);
      ctx.closePath();
    }

    function fitTextEndEllipsis(ctx, text, maxPx){
      const s = String(text || "");
      if(maxPx <= 0) return "";
      if(ctx.measureText(s).width <= maxPx) return s;

      const ell = "…";
      if(ctx.measureText(ell).width > maxPx) return "";

      let lo = 0, hi = s.length;
      while(lo < hi){
        const mid = Math.ceil((lo + hi) / 2);
        const cand = s.slice(0, mid) + ell;
        if(ctx.measureText(cand).width <= maxPx) lo = mid;
        else hi = mid - 1;
      }
      return s.slice(0, lo) + "…";
    }

    function drawHBarChart(ctx, items){
      const dpr = devicePixelRatio || 1;
      const W = ctx.canvas.width = Math.floor(ctx.canvas.clientWidth * dpr);
      const H = ctx.canvas.height = Math.floor(ctx.canvas.clientHeight * dpr);
      ctx.clearRect(0,0,W,H);

      if(!items.length){
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.font = `900 ${13 * dpr}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Sem dados para o gráfico", W/2, H/2);
        return;
      }

      const padL = 14 * dpr;
      const padR = 14 * dpr;
      const padT = 12 * dpr;
      const padB = 14 * dpr;

      const labelColW = 120 * dpr;
      const labelGap  = 8 * dpr;

      const plotX = padL + labelColW + labelGap;
      const plotW = W - plotX - padR;
      const plotH = H - padT - padB;

      const maxV = Math.max(1, ...items.map(x=>x.value || 0));

      const barH = Math.round(18 * dpr * 1.5);
      const gap  = Math.round(10 * dpr);

      const neededH = items.length * barH + (items.length - 1) * gap;
      let scale = 1;
      if(neededH > plotH){
        scale = plotH / neededH;
      }
      const bH = Math.max(8*dpr, Math.floor(barH * scale));
      const gH = Math.max(4*dpr, Math.floor(gap * scale));

      const totalH = items.length * bH + (items.length - 1) * gH;
      const startY = padT + Math.max(0, (plotH - totalH)/2);

      for(let i=0;i<items.length;i++){
        const {label, value:vRaw} = items[i];
        const v = isFinite(vRaw) ? vRaw : 0;

        const y = startY + i * (bH + gH);
        const w = (v / maxV) * plotW;

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.82)";
        ctx.font = `900 ${12 * dpr}px Arial`;
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        const maxLabelPx = (plotX - labelGap) - padL;
        const safeLabel = fitTextEndEllipsis(ctx, label, maxLabelPx);
        ctx.fillText(safeLabel, plotX - labelGap, y + (bH/2));
        ctx.restore();

        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.14)";
        ctx.shadowBlur = 10 * dpr;
        ctx.shadowOffsetX = 2 * dpr;
        ctx.shadowOffsetY = 3 * dpr;

        ctx.fillStyle = barColorByIndex(i, items.length);
        roundRectPath(ctx, plotX, y, Math.max(1, w), bH, 10 * dpr);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.84)";
        ctx.font = `900 ${12 * dpr}px Arial`;
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        const vx = Math.min(plotX + w + (4*dpr), W - padR - (18*dpr));
        ctx.fillText(String(v), vx, y + (bH/2));
        ctx.restore();
      }
    }

      const dataBR = isoToBR(dataISO);
      const lj = String(loja||"").trim();
      return dadosBrutos.some(r=>{
        return String(r.matricula||"").trim() === m
          && String(r.loja||"").trim() === lj
          && String(r.data||"").trim() === dataBR;

    async function confirmarLancamentoNaAba({ loja, matricula, dataBR }, maxTentativas = 12){
      for(let i=0;i<maxTentativas;i++){
        const r = await apiPost("/api/produtividade-verificar", { loja, matricula, data: dataBR });
        if(r && r.found && r.row){
          return r.row;
        }
        await new Promise(res=> setTimeout(res, 350));
      }
      return null;
    }

    function upsertRowInMemory(row){
      if(!row) return;
      const rn = Number(row.rowNumber || 0);
      if(rn >= 2){
        const idx = dadosBrutos.findIndex(x => Number(x.rowNumber) === rn);
        if(idx >= 0) dadosBrutos[idx] = row;
        else dadosBrutos.push(row);
      } else {
        dadosBrutos.push(row);
      }
      buildLojasPanelFromRows(dadosBrutos);
      aplicarFiltrosERender();
    }

    async function enviarLista(list){
      if(!Array.isArray(list) || !list.length){
        openAlert("Não foi possível salvar", "Não foi possível salvar pois a lista está vazia.");
        return false;
      }

      setLoading(true, "Enviando e confirmando…");
      await fakeProgressUntil(55, 70);

      try{
        for(let i=0;i<list.length;i++){
          const it = list[i];
          const dataBR = isoToBR(it.dataISO);

          const payloadBase = {
            loja: it.loja,
            setor: it.setor,
            matricula: it.matricula,
            nome: it.nome,
            data: dataBR,
            qtd: 1
          };

          await apiPost("/api/produtividade-adicionar", payloadBase);
          await fakeProgressUntil(Math.min(75, 55 + Math.floor((i+1)*18/list.length)), 35);

          const foundRow = await confirmarLancamentoNaAba({ loja: it.loja, matricula: it.matricula, dataBR });
          if(!foundRow){
            setLoading(false);
            openAlert("Não foi possível confirmar", `Não foi possível confirmar o lançamento de ${it.nome} (${it.matricula}) em ${dataBR}.`);
            return false;
          }
          upsertRowInMemory(foundRow);
          await fakeProgressUntil(Math.min(92, 75 + Math.floor((i+1)*15/list.length)), 30);
        }

        await fakeProgressUntil(100, 25);
        setLoading(false);

        pendingList = [];
        pendSave(pendingList);
        closeModal();
        closePend();

        showToast("Salvo com sucesso");
        return true;
      }catch(err){
        setLoading(false);
        if(err && (err.status === 401 || err.status === 403)) return irParaLogin();

        if(err && err.status === 409){
          openAlert("Não foi possível salvar", "Não foi possível salvar porque existe duplicidade (mesma matrícula na mesma data).");
          return false;
        }

        openAlert("Não foi possível salvar", err.message || "Erro ao salvar");
        return false;
      }
    }

    btnSalvar.addEventListener("click", async ()=>{
      if(sessaoExpirada()) return irParaLogin();

      if(editRow){
        const v = validarCamposAtuais();
        if(!v) return;

        const dataBR = isoToBR(v.dataISO);

        const payloadBase = {
          loja: sessao.loja,
          setor: v.setor,
          matricula: v.matricula,
          nome: v.nome,
          data: dataBR,
          qtd: 1
        };

        setLoading(true, "Salvando edição e recarregando…");
        await fakeProgressUntil(70, 70);

        try{
          await apiPost("/api/produtividade-editar", { ...payloadBase, rowNumber: editRow });
          await fakeProgressUntil(85, 70);
          closeModal();
          await carregarDados();
          await fakeProgressUntil(100, 25);
          setLoading(false);
          showToast("Salvo com sucesso");
        }catch(err){
          setLoading(false);
          if(err && (err.status === 401 || err.status === 403)) return irParaLogin();

          if(err && err.status === 409){
            const msg = `Não foi possível salvar porque já existe lançamento da matrícula ${v.matricula} (${v.nome}) nessa mesma data (${dataBR}).`;
            openAlert("Não foi possível salvar", msg);
            return;
          }

          openAlert("Não foi possível salvar", err.message || "Erro ao salvar");
        }
        return;
      }

      if(!pendingList.length){
        openAlert("Não foi possível salvar", "Não foi possível salvar pois a lista está vazia.");
        return;
      }
      await enviarLista(pendingList);
    });

    let acTimer = null;
    mNome.addEventListener("input", ()=>{
      const term = (mNome.value || "").trim();

    mMatricula.addEventListener("input", ()=>{

    function debouncedAutocomplete(term){
      clearTimeout(acTimer);
      acTimer = setTimeout(()=> autocomplete(term), 220);
    }

    async function autocomplete(term){
      term = (term || "").trim();
      if(term.length < 2){
        mSugList.classList.remove("open");
        mSugList.innerHTML = "";
        return;
      }

      try{
        const data = await apiPost("/api/produtividade-autocomplete", { term, loja: sessao?.loja || "" });
        const items = Array.isArray(data.items) ? data.items : [];

        if(!items.length){
          mSugList.classList.remove("open");
          mSugList.innerHTML = "";
          return;
        }

        mSugList.innerHTML = items.slice(0, 25).map(it=>{
          const nome = esc(it.nome || "");
          const mat = esc(it.matricula || "");
          return `<div class="suggestItem" data-nome="${nome}" data-mat="${mat}">
            <b>${nome}</b> <span style="color:#666;">— ${mat}</span>
          </div>`;
        }).join("");

        mSugList.classList.add("open");
      }catch(e){
        if(e && (e.status === 401 || e.status === 403)) return irParaLogin();
        mSugList.classList.remove("open");
        mSugList.innerHTML = "";
      }
    }

    mSugList.addEventListener("click", (e)=>{
      const item = e.target.closest(".suggestItem");
      if(!item) return;
      mNome.value = item.getAttribute("data-nome") || "";
      mMatricula.value = item.getAttribute("data-mat") || "";
      mSugList.classList.remove("open");
      mSugList.innerHTML = "";
    });

    document.addEventListener("click", (e)=>{
      const inside = mSugList.contains(e.target) || mNome.contains(e.target) || mMatricula.contains(e.target);
      if(!inside) mSugList.classList.remove("open");
    });

    btnPendExcluir.addEventListener("click", ()=>{
      pendingList = [];
      pendSave(pendingList);
      closePend();
      showToast("Lista pendente excluída");
    });

    btnPendAdd.addEventListener("click", ()=>{
      closePend();
      abrirAdicionar();
    });

    btnPendEnviar.addEventListener("click", async ()=>{
      await enviarLista(pendingList);
    });

    function maybeShowPendencia(){
      pendingList = pendLoad();
      if(pendingList.length){
        openPend(`Existe uma lista pendente com ${pendingList.length} item(s). Deseja finalizar o envio?`);
      }
    }

    (function init(){
      if(sessaoExpirada()) return irParaLogin();
      sessao = lerSessao();
      if(!sessao) return irParaLogin();

      fillSetorSelect();
      buildSetoresPanel();

      const m = monthNowValue();
      fDataIni.value = m;
      fDataFim.value = m;
      syncMonthDisplays();

      mData.value = hojeISO();

      lojasBtnTxt.textContent = "Carregando…";

      maybeShowPendencia();
      carregarDados();
    })();
  </script>
</body>
</html>
