<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <title>MENU PPP</title>
  <link rel="icon" type="image/png" href="/LogoBigUltra.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#030712">

  <style>
    :root{
      --bg0:#030712;
      --bg1:#0b1022;

      --txt: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);

      --radiusBtn: 12px;
      --radiusTop: 12px;

      --stroke1: rgba(255,255,255,.22);
      --stroke2: rgba(255,255,255,.10);

      --shadowOuter: 0 22px 60px rgba(0,0,0,.55);
      --shadowBtn: 0 18px 44px rgba(0,0,0,.40);
      --shadowInset: 0 16px 30px rgba(0,0,0,.34) inset;

      --infoMinFont: 09px;
      --infoMaxFont: 12px;
      --infoGap: 10px;
    }

    *{ box-sizing:border-box; }
    html, body{ width:100%; }

    html{
      min-height: 100%;
      background:
        radial-gradient(1200px 700px at 15% 18%, rgba(59,130,246,.20), transparent 62%),
        radial-gradient(900px 600px at 85% 35%, rgba(124,58,237,.16), transparent 58%),
        radial-gradient(900px 520px at 50% 88%, rgba(16,185,129,.10), transparent 62%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      background-color: var(--bg0);
    }

    body{
      margin:0;
      min-height: 100svh;
      min-height: 100dvh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color: var(--txt);

      overflow-x:hidden;
      overflow-y:auto;

      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;

      background:
        radial-gradient(1200px 700px at 15% 18%, rgba(59,130,246,.20), transparent 62%),
        radial-gradient(900px 600px at 85% 35%, rgba(124,58,237,.16), transparent 58%),
        radial-gradient(900px 520px at 50% 88%, rgba(16,185,129,.10), transparent 62%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      background-color: var(--bg0);

      display:grid;
      place-items:center;

      padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
    }

    @supports not (height: 100dvh){
      body{ min-height:100vh; }
    }

    body::before{
      content:"";
      position:fixed;
      inset:-40px;
      background:
        radial-gradient(2px 2px at 12% 18%, rgba(255,255,255,.22) 40%, transparent 60%),
        radial-gradient(1.6px 1.6px at 28% 42%, rgba(255,255,255,.16) 40%, transparent 60%),
        radial-gradient(1.8px 1.8px at 65% 28%, rgba(255,255,255,.12) 40%, transparent 60%),
        radial-gradient(1.4px 1.4px at 78% 62%, rgba(255,255,255,.14) 40%, transparent 60%),
        radial-gradient(1.2px 1.2px at 46% 70%, rgba(255,255,255,.10) 40%, transparent 60%);
      opacity:.52;
      pointer-events:none;
      transform: translateZ(0);
    }

    .wrap{
      width: min(520px, 92vw);
      position: relative;
    }

    .glow{
      position:absolute;
      inset:-18px;
      border-radius: 20px;
      background:
        radial-gradient(520px 260px at 50% -10%, rgba(96,165,250,.22), transparent 62%),
        radial-gradient(420px 260px at 22% 92%, rgba(124,58,237,.14), transparent 62%),
        radial-gradient(420px 260px at 88% 84%, rgba(16,185,129,.10), transparent 62%);
      filter: blur(14px);
      opacity:.70;
      pointer-events:none;
      z-index:0;
    }

    .container{
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 16px 16px 12px;
      border-radius: 18px;
      background: transparent;
      border: 0;
      box-shadow: none;
      text-align:center;
    }

    .top{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .brandLogo{
      width: 240px;
      max-width: 72%;
      height: auto;
      display:block;
      margin: 2px auto 0;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.35));
      opacity: .98;
      user-select:none;
      -webkit-user-drag:none;
    }

    .linha-logo{ display:none; }

    .card-info{
      width: 100%;
      padding: 9px 12px;
      border-radius: var(--radiusTop);
      border: 1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(120% 120% at 50% -10%, rgba(255,255,255,.16), transparent 52%),
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      box-shadow:
        var(--shadowBtn),
        0 0 0 1px rgba(0,0,0,.22) inset,
        0 14px 28px rgba(0,0,0,.26) inset;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-align:left;
      overflow:hidden;
      margin: 0;
    }

    .info-line{
      display:flex;
      align-items:center;
      justify-content:center;
      gap: var(--infoGap);
      flex-wrap: nowrap;
      font-size: var(--infoMaxFont);
      font-weight: 900;
      color: rgba(255,255,255,.92);
      min-width: 0;
      white-space: nowrap;
      line-height: 1.1;
      transform-origin: left center;
      padding-right: 10px;
      overflow: visible;
    }

    .info-item{
      display:flex;
      align-items:center;
      gap: 7px;
      min-width: 0;
      white-space: nowrap;
      flex: 0 1 auto;
      overflow: visible;
    }

    .info-text{
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 900;
      color: rgba(255,255,255,.92);
      display:inline-block;
      font-size: inherit;
    }

    .info-icon{
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      filter: drop-shadow(0 7px 12px rgba(0,0,0,.40));
      color: #60a5fa;
      opacity: 1;
    }

    .btn{
      position:relative;
      width: 100%;
      margin-top: 10px;
      padding: 10px 14px;

      border-radius: var(--radiusBtn);
      cursor: pointer;
      transition: transform .12s ease, filter .12s ease, opacity .12s ease;
      color: #fff;
      text-align:left;
      -webkit-tap-highlight-color: transparent;
      overflow:hidden;

      border: 1px solid rgba(255,255,255,.18);

      box-shadow:
        0 22px 44px rgba(0,0,0,.52),
        0 10px 22px rgba(0,0,0,.30),
        0 0 0 1px rgba(0,0,0,.24) inset,
        0 16px 30px rgba(0,0,0,.34) inset;

      display:block;
      font-size: 16px;
      font-weight: 950;
      letter-spacing: .2px;
    }

    .btn::before{
      content:"";
      position:absolute;
      inset: 1px;
      border-radius: calc(var(--radiusBtn) - 1px);
      background:
        radial-gradient(150% 110% at 50% -14%, rgba(255,255,255,.40), transparent 56%),
        radial-gradient(110% 80% at 12% 22%, rgba(255,255,255,.18), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.14));
      opacity: .96;
      pointer-events:none;
      mix-blend-mode: overlay;
    }

    .btn::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius: var(--radiusBtn);
      background:
        linear-gradient(180deg, rgba(255,255,255,.22), transparent 28%),
        linear-gradient(90deg, rgba(255,255,255,.10), transparent 20%, transparent 80%, rgba(255,255,255,.08));
      opacity:.86;
      pointer-events:none;
    }

    .btn:hover{ transform: translateY(-1px); filter: brightness(1.05) saturate(1.03); }
    .btn:active{ transform: translateY(0px); filter: brightness(.98) saturate(.98); }

    .btnInner{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap: 10px;
      width: 100%;
      min-width: 0;
    }

    .btnIcon{
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      display:grid;
      place-items: start center;
      opacity: .98;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.50));
    }

    .btnIcon svg{
      width: 24px;
      height: 24px;
      display:block;
    }

    .icoFlat{
      fill: none;
      stroke: rgba(255,255,255,.96);
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btnLabel{
      flex: 1 1 auto;
      min-width: 0;
      font-size: 17px;
      font-weight: 950;
      letter-spacing: .2px;
      color: rgba(255,255,255,.95);
      text-shadow: 0 12px 22px rgba(0,0,0,.42);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btnChevron{
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      opacity: .86;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,.48));
    }
    .btnChevron path{ stroke: rgba(255,255,255,.92); }

    .btn-green{
      background: linear-gradient(180deg, #42d36a 0%, #18a553 55%, #118444 100%);
    }
    .btn-blue{
      background: linear-gradient(180deg, #4aa3ff 0%, #2f6bff 55%, #1f57ff 100%);
    }
    .btn-purple{
      background: linear-gradient(180deg, #8b5dff 0%, #6a35e8 55%, #4a22b8 100%);
    }
    .btn-orange{
      background: linear-gradient(180deg, #f2a129 0%, #d47a00 55%, #b85f00 100%);
    }
    .btn-cyan{
      background: linear-gradient(180deg, #32d1df 0%, #12a8c0 55%, #0b7e98 100%);
    }
    .btn-gray{
      background: linear-gradient(180deg, #9aa6b2 0%, #6e7a86 55%, #55606a 100%);
    }
    
    .no-access{
      opacity: .42;
      filter: grayscale(.40);
      cursor: not-allowed;
      transform:none !important;
    }
    .no-access:hover{ transform:none; filter: grayscale(.40) brightness(1.00); }

    #btnLogin{ display:none; }

    .mensagem{
      margin-top: 12px;
      text-align:center;
      font-weight:700;
      font-size: 13px;
      min-height: 18px;
      color: rgba(255,255,255,.75);
    }

    .toast{
      position: fixed;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 9999;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(7,12,28,.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(255,255,255,.92);
      font-size: 13px;
      font-weight: 850;
      box-shadow: 0 18px 40px rgba(0,0,0,.40);
      opacity: 0;
      pointer-events: none;
      transition: opacity .12s ease;
      max-width: min(520px, 92vw);
      text-align: center;
    }
    .toast.show{ opacity: 1; }

@media (max-width: 520px){
  .container{ padding: 14px 12px 10px; }
  .brandLogo{ width: 230px; }
  .btnLabel{ font-size: 16px; }
  .card-info{ padding: 9px 11px; }
  .info-line{ gap: 9px; padding-right: 10px; font-size: 11px; }
}

@media (max-width: 390px){
  .btnLabel{ font-size: 15px; }
  .btnIcon{ width: 25px; height: 25px; flex-basis: 25px; }
  .btnIcon svg{ width: 23px; height: 23px; }
  .btnChevron{ width: 17px; height: 17px; flex-basis: 17px; }

  .info-line{ gap: 8px; font-size: 10px; }
  .info-icon{ width: 15px; height: 15px; flex-basis: 15px; }
}

@media (prefers-reduced-motion: reduce){
  *{ transition:none !important; }
  .btn:hover{ transform:none; }
}
    
  </style>
</head>

    </div>
  </div>

  <div class="toast" id="toast">Acesso indisponível para o perfil</div>

  <script>
    const STORAGE_KEY_GESTOR = "PPP_LOGIN_GESTOR";

    const ROTAS = {
      lancamento: "/painel.html",
      gerencial: "/painel-gestor.html",
      dashboard: "/dashboard.html",
      contagemCarrinhos: "/contagem-carrinhos.html",
      dashboardCarrinhos: "/dashboard-carrinhos.html",
      bonoDigital: "/bono-digital.html",
      visualizacaoBono: "/visualizacao-bono.html",
      usuariosAdmin: "/usuarios.html",
      produtividade: "/produtividade.html",
      login: "/login.html",
      logoutApi: "/api/logout"
    };

    let sessaoAtual = null;
    let expTimerId = null;

    async function obterSessaoDoBackend() {
      try {
        const resp = await fetch("/api/session", {
          method: "GET",
          credentials: "include",
          headers: { "Accept": "application/json" }
        });
        if (!resp.ok) return null;
        const dados = await resp.json().catch(() => null);
        if (!dados || !dados.sucesso || !dados.usuario || !dados.loja || !dados.perfil) return null;
        return dados;
      } catch {
        return null;
      }
    }

    function normalizarExpParaMs(exp) {
      const n = Number(exp);
      if (!Number.isFinite(n) || n <= 0) return null;
      if (n < 10_000_000_000) return n * 1000;
      return n;
    }

    function limparTimerExpiracao() {
      if (expTimerId) {
        clearTimeout(expTimerId);
        expTimerId = null;
      }
    }

    function agendarModoDeslogadoNaExpiracao(expMs) {
      limparTimerExpiracao();
      if (!expMs) return;
      const msRestante = expMs - Date.now();
      if (msRestante <= 0) return entrarModoDeslogado("Sessão expirada. Faça login novamente.");
      expTimerId = setTimeout(() => {
        entrarModoDeslogado("Sessão expirada. Faça login novamente.");
      }, msRestante);
    }

    function setTexto(id, txt) {
      const el = document.getElementById(id);
      if (el) el.textContent = txt;
    }

    let toastTimer = null;
    function showToast(txt) {
      const t = document.getElementById("toast");
      if (!t) return;
      t.textContent = txt || "Acesso indisponível para o perfil";
      t.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        t.classList.remove("show");
      }, 2000);
    }

    function entrarModoDeslogado(mensagem) {
      sessaoAtual = null;
      limparTimerExpiracao();
      document.getElementById("cardInfo").style.display = "none";

      document.getElementById("btnSair").style.display = "none";
      document.getElementById("btnLogin").style.display = "";

      setTexto("msg", mensagem || "Sessão encerrada. Se precisar, faça login novamente.");

      aplicarPermissoes("");
    }

    function entrarModoLogado(sessao) {
      sessaoAtual = sessao;
      document.getElementById("cardInfo").style.display = "";

      setTexto("infoLoja", sessao.loja || "—");
      setTexto("infoUsuario", sessao.usuario || "—");
      setTexto("infoPerfil", sessao.perfil || "—");

      aplicarPermissoes(sessao.perfil);

      document.getElementById("btnSair").style.display = "";
      document.getElementById("btnLogin").style.display = "none";

      setTexto("msg", "");

      const expMs = normalizarExpParaMs(sessao.exp);
      if (expMs) agendarModoDeslogadoNaExpiracao(expMs);
    }

    function aplicarPermissoes(perfil) {
      const p = String(perfil || "").trim().toUpperCase();

      const podeTudo = (p === "GERENTE_PPP" || p === "ADMINISTRADOR");
      const podeBase = (p === "BASE_PPP");

      const acesso = {
        lancamento: (podeTudo || podeBase),
        dashboard: (podeTudo || podeBase),
        contagemCarrinhos: (podeTudo || podeBase),
        dashboardCarrinhos: (podeTudo || podeBase),
        gerencial: (podeTudo),
        bonoDigital: !!p,
        visualizacaoBono: !!p,
        usuariosAdmin: (p === "ADMINISTRADOR"),
        produtividade: (podeTudo || podeBase),
        sair: !!p
      };

      setNoAccess("btnLancamento", !acesso.lancamento);
      setNoAccess("btnDashboard", !acesso.dashboard);
      setNoAccess("btnContagemCarrinhos", !acesso.contagemCarrinhos);
      setNoAccess("btnDashboardCarrinhos", !acesso.dashboardCarrinhos);
      setNoAccess("btnGerencial", !acesso.gerencial);
      setNoAccess("btnBonoDigital", !acesso.bonoDigital);
      setNoAccess("btnVisualizacaoBono", !acesso.visualizacaoBono);
      setNoAccess("btnUsuariosAdmin", !acesso.usuariosAdmin);
      setNoAccess("btnProdutividadeOperacao", !acesso.produtividade);
      setNoAccess("btnSair", !acesso.sair);
    }

    function setNoAccess(btnId, noAccess) {
      const el = document.getElementById(btnId);
      if (!el) return;
      if (noAccess) el.classList.add("no-access");
      else el.classList.remove("no-access");
      el.dataset.noAccess = noAccess ? "1" : "0";
    }

    function setSessaoGestor(sessao) {
      try {
        sessionStorage.setItem(STORAGE_KEY_GESTOR, JSON.stringify({
          usuario: sessao.usuario,
          loja: sessao.loja,
          perfil: sessao.perfil,
          ts: Date.now()
        }));
        return true;
      } catch {
        return false;
      }
    }

    async function logoutBackendSeguro() {
      try {
        await fetch(ROTAS.logoutApi, { method:"POST", credentials:"include" });
      } catch {}
    }

    function guardAcesso(btnId, onAllowed) {
      const el = document.getElementById(btnId);
      if (!el) return;
      el.onclick = () => {
        if (!sessaoAtual) return entrarModoDeslogado("Sessão inválida.");
        if (el.dataset.noAccess === "1") {
          showToast("Acesso indisponível para o perfil");
          return;
        }
        onAllowed();
      };
    }

    document.addEventListener("DOMContentLoaded", async () => {
      document.getElementById("btnLogin").addEventListener("click", () => {
        window.location.href = ROTAS.login;
      });

      const sessao = await obterSessaoDoBackend();
      if (!sessao) entrarModoDeslogado("Você está no menu, mas sem sessão ativa.");
      else entrarModoLogado(sessao);

      guardAcesso("btnLancamento", () => location.href = ROTAS.lancamento);
      guardAcesso("btnDashboard", () => location.href = ROTAS.dashboard);
      guardAcesso("btnContagemCarrinhos", () => location.href = ROTAS.contagemCarrinhos);
      guardAcesso("btnDashboardCarrinhos", () => location.href = ROTAS.dashboardCarrinhos);
      guardAcesso("btnBonoDigital", () => location.href = ROTAS.bonoDigital);
      guardAcesso("btnVisualizacaoBono", () => location.href = ROTAS.visualizacaoBono);
      guardAcesso("btnUsuariosAdmin", () => location.href = ROTAS.usuariosAdmin);
      guardAcesso("btnProdutividadeOperacao", () => location.href = ROTAS.produtividade);

      const btnGerencial = document.getElementById("btnGerencial");
      btnGerencial.onclick = () => {
        if (!sessaoAtual) return entrarModoDeslogado("Sessão inválida.");
        if (btnGerencial.dataset.noAccess === "1") {
          showToast("Acesso indisponível para o perfil");
          return;
        }
        if (!setSessaoGestor(sessaoAtual)) {
          setTexto("msg", "Não foi possível iniciar sessão do gestor.");
          return;
        }
        location.href = ROTAS.gerencial;
      };

      const btnSair = document.getElementById("btnSair");
      btnSair.onclick = async () => {
        if (!sessaoAtual) {
          showToast("Acesso indisponível para o perfil");
          return;
        }
        try { sessionStorage.removeItem(STORAGE_KEY_GESTOR); } catch {}
        await logoutBackendSeguro();
        window.location.href = ROTAS.login;
      };
    });
  </script>
</body>
</html>
